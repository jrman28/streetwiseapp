kind = "video"
previewPath = "/streetwise-video/"
title = "Streetwise — Product Teaser"
version = "1.0.0"
id = "artifacts/streetwise-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/streetwise-video/" ]
localPort = 20689

[services.development]
run = "pnpm --filter @workspace/streetwise-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/streetwise-video", "run", "build" ]
publicDir = "artifacts/streetwise-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20689"
BASE_PATH = "/streetwise-video/"
