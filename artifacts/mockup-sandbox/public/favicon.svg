<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Parchment background with squircle shape -->
  <rect width="32" height="32" rx="7" fill="#F7F5F0"/>
  <!-- Amber location pin body -->
  <path d="M16 5C12.134 5 9 8.134 9 12c0 5.25 7 15 7 15s7-9.75 7-15c0-3.866-3.134-7-7-7z" fill="#D97706"/>
