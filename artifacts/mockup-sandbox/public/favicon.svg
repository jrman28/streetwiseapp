  <circle cx="16" cy="12" r="4.2" fill="#1A1814"/>
  <!-- Horizontal street lines -->
  <line x1="11.8" y1="11" x2="20.2" y2="11" stroke="#D97706" stroke-width="0.7"/>
  <line x1="11.8" y1="13" x2="20.2" y2="13" stroke="#D97706" stroke-width="0.7"/>
  <!-- Vertical street lines -->
  <line x1="14.5" y1="7.8" x2="14.5" y2="16.2" stroke="#D97706" stroke-width="0.7"/>
  <line x1="17.5" y1="7.8" x2="17.5" y2="16.2" stroke="#D97706" stroke-width="0.7"/>
</svg>
